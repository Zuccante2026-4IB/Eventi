<!doctype html>
<html>

<head>
    <title>Progetto GetUP – Login</title>


    <style>
        @import url("https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap");

        .body1 {
            font-family: "Lora";
            display: flex;
            flex-direction: column;
            align-items: center;
            background-size: cover;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            font-size: 16px;
            background-color: #edf2f4;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            align-self: center;
            width: 96%;
            padding: 12px;
            opacity: 0.9;
        }

        header div {
            margin: 6px;
        }

        .headtitle {
            text-align: left;
        }

        .headswitch {
            text-align: right;
        }

        .toggle-label {
            display: inline-block;
        }

        .navlist {
            text-align: center;
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }

        .navlist li {
            float: left;
        }

        .navlist li a {
            color: #282828;
            text-decoration: none;
            border-right: 1px #282828 solid;
            padding: 0 14px;
            cursor: pointer;
        }

        .navlist li:last-child a {
            border-right: none;
        }

        .navlist li a:hover {
            color: #080808;
        }

        .toggle-checkbox {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .toggle-slot {
            font-size: 10px;
            position: relative;
            height: 3.5em;
            width: 7em;
            border-radius: 10em;
            background-color: white;
            transition: background-color 250ms;
        }

        .toggle-checkbox:checked ~ .toggle-slot {
            background-color: #374151;
        }

        .toggle-button {
            transform: translate(0.3em, 0em);
            position: absolute;
            height: 3em;
            width: 3em;
            border-radius: 50%;
            background-color: #ffeccf;
            box-shadow: inset 0px 0px 0px 0.75em #ffbb52;
            transition: background-color 250ms, border-color 250ms, transform 500ms cubic-bezier(.26,2,.46,.71);
        }

        .toggle-checkbox:checked ~ .toggle-slot .toggle-button {
            background-color: #485367;
            box-shadow: inset 0px 0px 0px 0.75em white;
            transform: translate(3.65em, 0em);
        }

        .sun-icon {
            position: absolute;
            height: 6em;
            width: 6em;
            color: #ffbb52;
        }

        .sun-icon-wrapper {
            position: absolute;
            height: 6em;
            width: 6em;
            opacity: 1;
            transform: translate(2em, 2em) rotate(15deg);
            transform-origin: 50% 50%;
            transition: opacity 150ms, transform 500ms cubic-bezier(.26,2,.46,.71);
        }

        .toggle-checkbox:checked ~ .toggle-slot .sun-icon-wrapper {
            opacity: 0;
            transform: translate(3em, 2em) rotate(0deg);
        }

        .moon-icon {
            position: absolute;
            height: 6em;
            width: 6em;
            color: white;
        }

        .moon-icon-wrapper {
            position: absolute;
            height: 6em;
            width: 6em;
            opacity: 0;
            transform: translate(11em, 2em) rotate(0deg);
            transform-origin: 50% 50%;
            transition: opacity 150ms, transform 500ms cubic-bezier(.26,2.5,.46,.71);
        }

        .toggle-checkbox:checked ~ .toggle-slot .moon-icon-wrapper {
            opacity: 1;
            transform: translate(2em, 2em) rotate(-15deg);
        }

        /* LOGIN BOX */
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            width: 100%;
            padding: 3rem 1rem;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .login-box {
            background-color: #edf2f4;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            opacity: 0.95;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        .login-box h2 {
            font-family: "Lora", serif;
            font-size: 22px;
            font-weight: 700;
            color: #282828;
            text-align: center;
            margin-bottom: 4px;
        }

        .login-box input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-family: "Lora", serif;
            font-size: 15px;
            background-color: #fff;
            color: #282828;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-box input:focus {
            border-color: #282828;
        }

        .login-box button {
            width: 100%;
            padding: 11px;
            border-radius: 12px;
            border: none;
            background-color: #282828;
            color: #edf2f4;
            font-family: "Lora", serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-box button:hover {
            background-color: #080808;
        }

        .login-box p {
            font-size: 13px;
            color: #555;
            text-align: center;
        }

        .link {
            color: #282828;
            cursor: pointer;
            text-decoration: underline;
            font-weight: 600;
        }
    </style>

    <script src="js/account.js"></script>
</head>

<body class="body1">

    <!-- HEADER -->
    <header>
        <div class="header-title">
            <span class="headtitle">Progetto GetUP</span>
        </div>

        <nav>
            <ul class="navlist">
                <li><a href="index.html">Homepage</a></li>
                <li><a href="#">Chi siamo</a></li>
                <li><a href="#">Eventi</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main id="main">
        <div class="login-container">
            <div class="login-box">
                <h2>Login</h2>
                <input id="username" type="text" placeholder="Username">
                <input id="password" type="password" placeholder="Password">
                <button onclick="account('login')">Accedi</button>
                <p>Non hai un account?
                    <span onclick="mostraRegistrazionePage()" class="link">Registrati</span>
                </p>
            </div>
        </div>
    </main>

    <script src="js/account.js"></script>

</body>

</html>
